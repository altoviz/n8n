workflow: GitHubFlow/v1

# Commit message-driven version bumps (Conventional Commits style):
#   feat:                  → minor  (0.x.0)
#   fix: / perf:           → patch  (0.0.x)
#   BREAKING CHANGE or
#   +semver: major         → major  (x.0.0)
#   +semver: none / skip   → no bump

major-version-bump-message: '(\+semver:\s?(breaking|major)|BREAKING CHANGE|breaking change)'
minor-version-bump-message: '(feat(\(.+\))?!?:|\+semver:\s?(feature|minor))'
patch-version-bump-message: '(fix(\(.+\))?:|perf(\(.+\))?:|\+semver:\s?(fix|patch))'
no-bump-message: '(\+semver:\s?(none|skip)|^Merge branch)'
commit-message-incrementing: Enabled

branches:
  main:
    increment: Patch
    prevent-increment:
      of-merged-branch: true
  feature:
    label: '{BranchName}'
    increment: Minor
    source-branches:
      - main
      - release
  release:
    label: beta
    increment: Patch
    is-release-branch: true
    source-branches:
      - master
  pull-request:
    label: 'PullRequest{Number}'
    increment: Inherit
    source-branches:
      - master
      - feature
      - release
