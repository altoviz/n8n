components:
  schemas:
    AccountingSettingsDto:
      type: object
      properties:
        accountNumberLength:
          type: integer
          format: int32
        customerAccountFormat:
          type: string
          nullable: true
        customerCollectiveAccount:
          type: string
          nullable: true
        expensesImportVatReverseAccountNumber:
          type: string
          nullable: true
        expensesJournalCode:
          type: string
          nullable: true
        expensesSubcontractingVatReverseAccountNumber:
          type: string
          nullable: true
        feesAccountingAccountNumber:
          type: string
          nullable: true
        generateCustomerAccount:
          type: boolean
        generateSupplierAccount:
          type: boolean
        miscJournalCode:
          type: string
          nullable: true
        salesDepositAccountingAccountNumber:
          type: string
          nullable: true
        salesJournalCode:
          type: string
          nullable: true
        salesShippingAccountNumber:
          type: string
          nullable: true
        salesVatCollectionAccountingAccountNumber:
          type: string
          nullable: true
        supplierAccountFormat:
          type: string
          nullable: true
        supplierCollectiveAccount:
          type: string
          nullable: true
        uncertainAccountNumberRoot:
          type: string
          nullable: true
      additionalProperties: false
    AddressFields:
      type: object
      properties:
        city:
          type: string
          nullable: true
        countryIso:
          type: string
          nullable: true
        countryName:
          type: string
          nullable: true
          readOnly: true
        formattedAddress:
          type: string
          nullable: true
          readOnly: true
        inlineAddress:
          type: string
          nullable: true
          readOnly: true
        street:
          type: string
          nullable: true
        zipcode:
          type: string
          nullable: true
      additionalProperties: false
    BankProvider:
      type: object
      properties:
        countryCodes:
          type: array
          items:
            type: string
          description: Bank provider country codes
          nullable: true
        id:
          type: string
          description: Bank provider Id
          nullable: true
        logoUri:
          type: string
          description: Bank provider logo URI
          nullable: true
        markets:
          type: array
          items:
            type: string
          description: Bank provider markets
          nullable: true
        name:
          type: string
          description: Bank provider name
          nullable: true
      additionalProperties: false
      description: Bank provider
    BillingOptions:
      type: object
      properties:
        allowed:
          type: boolean
          description: Allowed
          nullable: true
        bankAccountId:
          type: integer
          description: Bank account ID
          format: int32
          nullable: true
        buyerReference:
          type: string
          description: Buyer reference
          nullable: true
        colleagueId:
          type: integer
          description: Colleague ID
          format: int32
          nullable: true
        discount:
          $ref: "#/components/schemas/Discount"
        initialCommitmentAmount:
          type: number
          description: Intial commitment amount
          format: double
          nullable: true
        initialCommitmentDate:
          type: string
          description: Initial commitment date
          format: date
          nullable: true
        initialCommitmentStatus:
          $ref: "#/components/schemas/CommitmentStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        sendDocumentAsAttachment:
          type: boolean
          description: Send document as attachment
          nullable: true
        settlementTermId:
          type: integer
          description: Settlement term ID
          format: int32
          nullable: true
        useTaxIncludedPrices:
          type: boolean
          description: Use tax included prices
          nullable: true
        vatReverseCharge:
          type: boolean
          description: Indicates VAT should be included in sales
          nullable: true
        vendorReference:
          type: string
          description: Vendor reference. Used to be print on sales
          nullable: true
      additionalProperties: false
      description: Billing options
    Classification:
      type: object
      properties:
        accountNumber:
          type: string
          description: Account number
          nullable: true
          readOnly: true
        defaultVat:
          $ref: "#/components/schemas/Vat"
        description:
          type: string
          description: Description
          nullable: true
          readOnly: true
        id:
          type: integer
          description: Classification ID
          format: int32
        isProduct:
          type: boolean
          description: Indicates whether classification is product (should be defined when
            type is 'Sale')
          readOnly: true
        isService:
          type: boolean
          description: Indicates whether classification is service (should be defined when
            type is 'Sale')
          readOnly: true
        label:
          type: string
          description: Label
          nullable: true
          readOnly: true
        microBusinessDeclarationType:
          $ref: "#/components/schemas/MicroBusinessDeclarationTypes"
        type:
          $ref: "#/components/schemas/ClassificationType"
      additionalProperties: false
      description: Classification
    ClassificationDto:
      type: object
      properties:
        accountNumber:
          type: string
          nullable: true
        defaultVat:
          $ref: "#/components/schemas/VatDto"
        defaultVatId:
          type: integer
          format: int32
          nullable: true
